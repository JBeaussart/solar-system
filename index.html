<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="planets sun" data-planet="sun">
      <span class="planet-hover-name">Soleil</span>
      <img src="./images/sun.png" alt="sun">
    </div>
    <div class="planets mercury" data-planet="mercury">
      <span class="planet-hover-name">Mercure</span>
    </div>
    <div class="planets venus" data-planet="venus">
      <span class="planet-hover-name">Vénus</span>
    </div>
    <div class="planets earth" data-planet="earth">
      <span class="planet-hover-name">Terre</span>
      <div class="moon">
        <span class="planet-hover-name">Lune</span>
      </div>
    </div>
    <div class="planets mars" data-planet="mars">
      <span class="planet-hover-name">Mars</span>
    </div>
    <div class="planets jupiter" data-planet="jupiter">
      <span class="planet-hover-name">Jupiter</span>
    </div>
    <div class="planets saturn" data-planet="saturn">
      <span class="planet-hover-name">Saturne</span>
    </div>
    <div class="planets uranus" data-planet="uranus">
      <span class="planet-hover-name">Uranus</span>
    </div>
    <div class="planets neptune" data-planet="neptune">
      <span class="planet-hover-name">Neptune</span>
    </div>
    <div class="planets pluton" data-planet="pluton">
      <span class="planet-hover-name">Pluton</span>
    </div>
  </div>
  <div class="controls">
    <button class="speed-toggle" type="button" aria-pressed="false">Activer la vitesse réelle</button>
  </div>
  <div class="info"><p class="info__hint">Cliquez sur une planète</p></div>
  <script src="./script.js"></script>
</body>
</html>
